# a theme based on the application's `default` theme
[[themes]]
name = "spotify"
[themes.palette]
black = "black"
red = "red"
green = "green"
yellow = "yellow"
blue = "blue"
magenta = "magenta"
cyan = "cyan"
white = "white"
bright_black = "bright_black"
bright_red = "bright_red"
bright_green = "bright_green"
bright_yellow = "bright_yellow"
bright_blue = "bright_blue"
bright_magenta = "bright_magenta"
bright_cyan = "bright_cyan"
bright_white = "bright_white"
[themes.component_style]
block_title = { fg = "BrightBlack" }
border = { fg = "BrightBlack" }
playback_status = { fg = "Green", modifiers = ["Bold"] }
playback_track = { fg = "Green", modifiers = ["Bold"] }
playback_artists = { fg = "Green", modifiers = ["Bold"] }
playback_album = { fg = "Yellow" }
playback_genres = { fg = "BrightBlack", modifiers = ["Italic"] }
playback_metadata = { fg = "BrightBlack" }
playback_progress_bar = { bg = "Black", fg = "Green" }
current_playing = { fg = "Green", modifiers = ["Bold"] }
page_desc = { fg = "Yellow", modifiers = ["Bold"] }
playlist_desc = { fg = "Green", modifiers = ["Italic"] }
table_header = { modifiers = ["Italic","Dim"] }
secondary_row = {}
like = {}
lyrics_played = { fg = "BrightBlack", modifiers = ["Italic"] }
lyrics_playing = { fg = "Yellow", modifiers = ["Bold"] }
