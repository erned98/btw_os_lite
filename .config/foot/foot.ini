# ~/.config/foot/foot.ini
# Minimal, known‑good example for River on Wayland

[main]
font=IosevkaTerm Nerd Font:size=16.5
pad=20x20	            # padding around text
vertical-letter-offset=1
term=foot

# Cursor: underline + blink
[cursor]
style=underline         # block, beam, underline, hollow
blink=yes
blink-rate=250
unfocused-style=none    # hollow when window unfocused
underline-thickness=2px

# Simple dark theme
[colors-dark]
foreground=ffffff
background=000000
alpha=0.6
cursor=000000 ffffff

regular0=000000  # black
regular1=d41919  # red
regular2=5ebdab  # green
regular3=fea44c  # yellow
regular4=367bf0  # blue
regular5=9855b3  # magenta
regular6=49aee6  # cyan
regular7=e6e6e6  # white

bright0=198388   # bright black
bright1=ec0101   # bright red
bright2=47d4b9   # bright green
bright3=ff8a18   # bright yellow
bright4=277fff   # bright blue
bright5=962ac3   # bright magenta
bright6=05a1f7   # bright cyan
bright7=ffffff   # bright white

# Mouse behaviour
[mouse]
hide-when-typing=yes

# Key bindings: keep defaults, but example of font zoom
[key-bindings]
font-increase=Control+equal
font-decrease=Control+minus
font-reset=Control+0

scrollback-up-line=Control+Shift+Up
scrollback-down-line=Control+Shift+Down
scrollback-up-page=Control+Shift+Page_Up
scrollback-down-page=Control+Shift+Page_Down
