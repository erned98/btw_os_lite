# ‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ
# ‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ
# ‚Ėą‚Ėą‚ēĎ ‚ēö‚ēź‚ēĚ ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ
# ‚ēö‚ēź‚ēĚ     ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ  ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ 
#                                                
# More option see https://github.com/DreamMaoMao/mango/wiki/

# Autostart
exec-once=wlsunset -l 52.1 -L 21.3 -T 4500 -t 1900
exec-once=awww-daemon
exec-once=waybar -c ~/.config/waybar/config-mango.jsonc
exec-once=/usr/lib/polkit-gnome/pokit-gnome-authentication-agent-1
exec-once=dunst -c ~/.config/dunst/dunstrc
exec-once=~/.local/bin/power
exec-once=~/.config/mango/bg

# Window effect
blur=1
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 10
blur_params_noise = 0.02
blur_params_brightness = 0.75
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 15
shadows_blur = 30
shadows_position_x = -15
shadows_position_y = -15
shadowscolor= 0x000000ff

border_radius=10
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=0.4

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=zoom
animation_type_close=zoom
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=0
zoom_initial_ratio=0.0
zoom_end_ratio=0.0
fadein_begin_opacity=0.0
fadeout_begin_opacity=1.0
animation_duration_move=200
animation_duration_open=200
animation_duration_tag=200
animation_duration_close=200
animation_duration_focus=200
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=10
scroller_default_proportion=0.5
scroller_default_proportion_single=1
scroller_focus_center=0
scroller_prefer_center=0
scroller_ignore_proportion_single=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=0
default_mfact=0.50
default_nmaster=1
smartgaps=0

# Overview Setting
hotarea_size=10
enable_hotarea=0
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=0
idleinhibit_ignore_visible=0
sloppyfocus=0
warpcursor=0
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1

# keyboard
repeat_rate=25
repeat_delay=500
numlockon=0
xkb_rules_layout=pl

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=1
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=6
gappiv=6
gappoh=6
gappov=6
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=3
rootcolor=0x201b14ff
bordercolor=0x000000ff
focuscolor=0xffffffff
maximizescreencolor=0xffffffff
urgentcolor=0xec0101ff
scratchpadcolor=0xffffffff
globalcolor=0xffffffff
overlaycolor=0x14a57cff

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:tgmix
tagrule=id:2,layout_name:scroller
tagrule=id:3,layout_name:monocle
tagrule=id:4,layout_name:monocle

# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER+CTRL,r,reload_config

# menu and terminal
bind=SUPER,space,spawn,rofi -terminal foot -show drun
bind=SUPER,Return,spawn,foot

# exit
bind=CTRL+SUPER,q,quit
bind=SUPER,q,killclient,

# switch window focus
bind=SUPER,Tab,focusstack,next
bind=SUPER+SHIFT,Tab,focusstack,prev
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# switch window status
bind=SUPER,g,toggleglobal,
bind=ALT,Tab,toggleoverview,
bind=SUPER,s,togglefloating,
bind=SUPER,a,togglemaximizescreen,
bind=SUPER,f,togglefullscreen,
bind=ALT+SHIFT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=ALT,z,toggle_scratchpad

# scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,

# switch layout
bind=SUPER,period,switch_layout

# tag switch
bind=SUPER,Prior,viewtoleft_have_client,0
bind=SUPER,Next,viewtoright_have_client,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
# bind=SUPER,5,view,5,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=SUPER+Shift,1,tag,1,0
bind=SUPER+Shift,2,tag,2,0
bind=SUPER+Shift,3,tag,3,0
bind=SUPER+Shift,4,tag,4,0
# bind=SUPER+Shift,5,tag,5,0

# monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# movewin
bind=SUPER+CTRL,Up,movewin,+0,-50
bind=SUPER+CTRL,Down,movewin,+0,+50
bind=SUPER+CTRL,Left,movewin,-50,+0
bind=SUPER+CTRL,Right,movewin,+50,+0

# resizewin
bind=SUPER+ALT,Up,resizewin,+0,-50
bind=SUPER+ALT,Down,resizewin,+0,+50
bind=SUPER+ALT,Left,resizewin,-50,+0
bind=SUPER+ALT,Right,resizewin,+50,+0

# apps
bind=SUPER,e,spawn,foot -T ranger -e ranger
bind=SUPER,h,spawn,foot -T htop -e htop
bind=SUPER,p,spawn,foot -T pulsemixer -e pulsemixer
bind=SUPER+SHIFT,w,spawn,foot -T newsboat -e newsboat -r
bind=SUPER+SHIFT,m,spawn,foot -T spotify -e spotify_player
bind=SUPER+SHIFT,b,spawn,brave
bind=SUPER+SHIFT,g,spawn,gimp
bind=SUPER+SHIFT,o,spawn,libreoffice

# utilities
bind=SUPER,l,spawn,~/.local/bin/lock
bind=SUPER,x,spawn,~/Scripts/btwos-power
bind=SUPER+CTRL,w,spawn,~/.config/mango/bg

# volume
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# music ctrl
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=NONE,XF86AudioPrev,spawn,playerctl previous
bind=NONE,XF86AudioNext,spawn,playerctl next

# screenshots
bind=NONE,Print,spawn,~/.config/mango/grim --screen
bind=SHIFT,Print,spawn,~/.config/mango/grim --clip

# brightness
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl set +10%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl set 10%-

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize

# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# layer rule
layerrule=animation_type_open:fade,layer_name:rofi
layerrule=animation_type_close:fade,layer_name:rofi

## Window Rules 
# terminal
windowrule=isterm:1,appid:foot
windowrule=tags:2,title:newsboat
windowrule=tags:4,title:spotify

# gui
windowrule=noblur:1,appid:slurp
windowrule=isfloating:1,appid:nwg-look
windowrule=isfloating:1,appid:wev
windowrule=isfloating:1,appid:brave
windowrule=isfullscreen:1,appid:imv
windowrule=isfullscreen:1,appid:mpv
windowrule=isglobal:1,appid:libreoffice
windowrule=isglobal:1,appid:libreoffice-writer
windowrule=isglobal:1,appid:libreoffice-calc
windowrule=tags:2,appid:brave-browser
windowrule=tags:3,appid:gimp
windowrule=tags:4,isfloating:1,isoverlay:1,appid:butt
